<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>地图导航</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    #container { width: 100%; height: 100%; background: #e8e8e8; }

    /* 顶部搜索面板 */
    #search-panel {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 999; background: #fff;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 12px 14px 10px;
    }

    /* 起终点输入 */
    #route-inputs {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.start { background: #50E3C2; }
    .dot.end { background: #EB5E1A; }
    .route-line { width: 10px; height: 22px; border-left: 2px dashed #ddd; margin-left: 4px; margin-bottom: 2px; }
    .input-group { flex: 1; }
    .input-row { position: relative; margin-bottom: 4px; }
    .input-row:last-child { margin-bottom: 0; }
    .input-row input {
      width: 100%; height: 34px; border: 1px solid #e0e0e0;
      border-radius: 8px; padding: 0 36px 0 10px; font-size: 13px;
      outline: none; background: #fafafa; display: block;
    }
    .input-row input.start-row { background: #f0fdf9; border-color: #bbf7d0; }
    .input-row input:focus { border-color: #EB5E1A; background: #fff; }
    .input-row input.start-row:focus { border-color: #50E3C2; }
    .input-row .btn-edit {
      position: absolute; right: 4px; top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 28px;
      background: none; border: none;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    .input-row .btn-edit:active { background: rgba(0,0,0,0.06); }
    .swap-btn {
      width: 28px; height: 28px; border: 1px solid #e0e0e0; background: #f5f5f5;
      border-radius: 50%; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .swap-btn:active { background: #e0e0e0; }

    /* 路线Tab */
    #route-tabs { display: flex; gap: 5px; margin-bottom: 6px; }
    .tab-btn {
      flex: 1; height: 30px; border: 1px solid #e0e0e0; background: #f5f5f5;
      border-radius: 6px; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 4px; color: #666; font-weight: 500;
    }
    .tab-btn.active { background: #EB5E1A; color: #fff; border-color: #EB5E1A; }

    /* 搜索行 */
    #search-row { display: none; gap: 6px; align-items: center; }
    #keyword {
      flex: 1; height: 34px; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 0 10px; font-size: 13px; outline: none; background: #fafafa;
    }
    #keyword:focus { border-color: #EB5E1A; background: #fff; }
    .btn-srch {
      height: 34px; padding: 0 14px;
      background: #EB5E1A; color: #fff; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer; font-weight: bold;
    }
    .btn-cancel {
      height: 34px; padding: 0 10px; background: #f5f5f5;
      border: 1px solid #ddd; border-radius: 8px; font-size: 13px;
      cursor: pointer; color: #666;
    }

    /* 搜索结果 */
    #result-list, #result-list-start {
      display: none; margin-top: 6px; max-height: 160px; overflow-y: auto;
      border-radius: 8px; border: 1px solid #f0f0f0; background: #fff;
    }
    .result-item {
      padding: 8px 10px; border-bottom: 1px solid #f5f5f5; cursor: pointer;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:active { background: #fff8f5; }
    .result-item .name { font-size: 14px; font-weight: 600; color: #333; }
    .result-item .addr { font-size: 12px; color: #999; margin-top: 2px; }
    .result-item .dist { font-size: 11px; color: #EB5E1A; margin-top: 2px; }

    /* 底部路线面板 */
    #route-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 998; background: #fff;
      border-radius: 12px 12px 0 0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.12);
      display: none; max-height: 45%; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom, 10px);
    }
    .rp-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 10px auto 8px; }
    .rp-header { padding: 0 16px 10px; border-bottom: 1px solid #f0f0f0; }
    .rp-dest { font-size: 16px; font-weight: bold; color: #333; }
    .rp-summary { font-size: 13px; color: #666; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .rp-summary span { color: #EB5E1A; font-weight: bold; }
    .rp-steps { padding: 4px 16px 10px; }
    .rp-step { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px dashed #f0f0f0; }
    .rp-step:last-child { border-bottom: none; }
    .step-icon {
      width: 22px; height: 22px; border-radius: 50%; background: #EB5E1A;
      color: #fff; font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .step-text { font-size: 13px; color: #333; line-height: 1.5; }
    .step-dist { font-size: 11px; color: #999; margin-top: 2px; }
    .step-road { font-size: 12px; color: #666; margin-top: 2px; }

    /* 工具栏 */
    #toolbar { position: fixed; right: 12px; bottom: 80px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .tool-btn {
      width: 40px; height: 40px; background: #fff; border: none;
      border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.14);
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .tool-btn:active { background: #f0f0f0; }
    .tool-btn.active { background: #EB5E1A; color: #fff; }

    /* 定位按钮 */
    #locBtn {
      position: fixed; right: 12px; bottom: 228px; width: 44px; height: 44px;
      background: #fff; border: none; border-radius: 50%;
      box-shadow: 0 1px 8px rgba(0,0,0,0.16);
      cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    #locBtn:active { background: #f0f0f0; }

    /* 调试 */
    #debug {
      position: fixed; bottom: 8px; left: 8px;
      background: rgba(0,0,0,0.7); color: #0f0; font-size: 10px;
      padding: 4px 8px; border-radius: 4px; z-index: 9999;
      max-width: 85%; word-break: break-all; line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <!-- 顶部搜索面板 -->
  <div id="search-panel">
    <div id="route-inputs">
      <div>
        <div class="dot start"></div>
        <div class="route-line"></div>
        <div class="dot end"></div>
      </div>
      <div class="input-group">
        <!-- 起点行 -->
        <div class="input-row start-row">
          <input id="startInput" type="text" placeholder="点击这里设置起点" value="天安门广场">
          <button class="btn-edit" id="btnStartEdit" title="编辑起点">✏️</button>
        </div>
        <!-- 终点行 -->
        <div class="input-row">
          <input id="endInput" type="text" placeholder="点击这里设置终点">
          <button class="btn-edit" id="btnEndEdit" title="编辑终点">✏️</button>
        </div>
      </div>
      <button class="swap-btn" id="btnSwap" title="互换起终点">⇅</button>
    </div>

    <div id="route-tabs">
      <button class="tab-btn active" data-type="driving">🚗 驾车</button>
      <button class="tab-btn" data-type="walking">🚶 步行</button>
      <button class="tab-btn" data-type="transit">🚌 公交</button>
    </div>

    <div id="search-row">
      <input id="keyword" type="text" placeholder="输入地点名称，点下方搜索">
      <button class="btn-srch" id="btnDoSearch">搜索</button>
      <button class="btn-cancel" id="btnCancelSearch">取消</button>
    </div>

    <div id="result-list"></div>
    <div id="result-list-start"></div>
  </div>

  <!-- 底部路线面板 -->
  <div id="route-panel">
    <div class="rp-handle"></div>
    <div class="rp-header">
      <div class="rp-dest" id="rp-dest">—</div>
      <div class="rp-summary" id="rp-summary"></div>
    </div>
    <div class="rp-steps" id="rp-steps"></div>
  </div>

  <!-- 工具栏 -->
  <div id="toolbar">
    <button class="tool-btn" id="trafficBtn" title="实时路况">🚦</button>
    <button class="tool-btn" id="btnReset" title="回到起点">🏠</button>
    <button class="tool-btn" id="btnStyle" title="切换样式">🗺️</button>
  </div>

  <!-- 定位按钮 -->
  <button id="locBtn">📍</button>

  <div id="debug">⏳ 正在加载地图...</div>

  <!-- ============================================================
       所有JS代码合并在一个 script 中，避免脚本加载顺序问题
  ============================================================ -->
  <script>
    // ====== 1. 安全密钥（必须在加载地图JS之前）======
    window._AMapSecurityConfig = {
      securityJsCode: '24b4877388301846de3978ea560d6c25'
    };

    // ====== 2. 全局变量 ======
    var map = null;
    var markerStart = null;
    var markerEnd = null;
    var routePolyline = null;
    var routeCopyLine = null;
    var trafficLayer = null;
    var currentPos = [116.397428, 39.90923];
    var currentDest = null;
    var currentRouteType = 'driving';
    var currentAllSteps = [];
    var mapStyleIdx = 0;
    var mapStyles = ['normal', 'light', 'dark', 'fresh'];
    var mapStyleNames = ['默认', '浅色', '深色', '马卡龙'];
    var mapLoaded = false;
    var trafficOn = false;
    var mapClickMode = 'end';
    var JS_KEY = '3a5628188e4853dcff3425f59058a32b';
    var WEB_KEY = '5c4aff1e82b1c39bd6733d6146fa9caa';

    var routeNames = { driving: '驾车', walking: '步行', transit: '公交' };
    var routeIcons = { driving: '🚗', walking: '🚶', transit: '🚌' };

    // ====== 3. 统一XHR请求（兼容模拟机）======
    function xhrGet(url, onSuccess, onError) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = 12000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try { onSuccess(JSON.parse(xhr.responseText)); }
            catch(e) { onError('JSON解析失败'); }
          } else { onError('HTTP ' + xhr.status); }
        }
      };
      xhr.onerror = function() { onError('网络请求失败'); };
      xhr.ontimeout = function() { onError('请求超时(12秒)'); };
      xhr.send(null);
    }

    // ====== 4. 日志 ======
    function log(msg) {
      var d = document.getElementById('debug');
      if (d) d.innerHTML = msg;
    }

    // ====== 5. 创建地图 ======
    function createMap() {
      try {
        log('🗺️ 创建地图...');
        map = new AMap.Map('container', {
          zoom: 13, center: currentPos, resizeEnable: true, viewMode: '2D'
        });

        map.on('click', function(e) {
          if (mapClickMode === 'start') {
            setStartPoint(e.lnglat.getLng(), e.lnglat.getLat(), '地图选点');
          } else {
            document.getElementById('endInput').value = '地图选点';
            setDestination(e.lnglat.getLng(), e.lnglat.getLat(), '地图选点');
          }
        });

        map.on('complete', function() {
          mapLoaded = true;
          renderStartMarker();
          log('✅ 地图就绪！请设置起终点');
        });

        setTimeout(function() {
          if (!mapLoaded) {
            mapLoaded = true;
            renderStartMarker();
            log('✅ 地图就绪！请设置起终点');
          }
        }, 4000);
      } catch(e) {
        log('❌ 创建地图失败: ' + e.message);
      }
    }

    // ====== 6. 动态加载地图JS ======
    function loadAMapScript(version) {
      log('📦 加载地图 v' + version + '...');
      var plugins = 'AMap.PlaceSearch,AMap.Driving,AMap.Walking,AMap.Transfer';
      var url = 'https://webapi.amap.com/maps?v=' + version +
        '&key=' + JS_KEY + '&plugin=' + plugins;

      var sc = document.createElement('script');
      sc.src = url;
      sc.onload = function() {
        log('📦 v' + version + ' 已下载');
        if (version === '2.0' && AMap && AMap.plugin) {
          try {
            AMap.plugin(['AMap.PlaceSearch', 'AMap.Driving', 'AMap.Walking', 'AMap.Transfer'], function() {
              log('🔌 插件就绪');
              createMap();
            });
          } catch(e) {
            log('⚠️ 插件失败，直接创建地图: ' + e);
            createMap();
          }
          // 保险：如果3秒后还没创建地图，强制调用
          setTimeout(function() {
            if (!map) { log('⏰ 超时强制创建地图'); createMap(); }
          }, 3000);
        } else {
          createMap();
        }
      };
      sc.onerror = function() {
        if (version === '2.0') {
          log('⚠️ v2.0失败，降级到 v1.4.15...');
          delete window._AMapSecurityConfig;
          loadAMapScript('1.4.15');
        } else {
          log('❌ 地图加载失败，请检查网络');
        }
      };
      document.head.appendChild(sc);
    }

    setTimeout(function() { if (!mapLoaded) log('⏳ 加载较慢...'); }, 10000);
    setTimeout(function() {
      if (!mapLoaded) log('❌ 超时 | <span id="retryBtn" style="color:#ff0;cursor:pointer">点此重试</span>');
    }, 25000);

    // ====== 7. 业务函数 ======

    function renderStartMarker() {
      if (!map) return;
      if (markerStart) map.remove(markerStart);
      markerStart = new AMap.Marker({
        position: currentPos, map: map,
        content: '<div style="background:#50E3C2;width:14px;height:14px;border-radius:50%;border:3px solid #fff"></div>',
        offset: new AMap.Pixel(-7, -7)
      });
    }

    function setStartPoint(lng, lat, name) {
      currentPos = [lng, lat];
      document.getElementById('startInput').value = name;
      document.getElementById('result-list-start').style.display = 'none';
      mapClickMode = 'end';
      renderStartMarker();
      if (currentDest) planRoute();
      log('✅ 起点: ' + name);
    }

    function setDestination(lng, lat, name) {
      currentDest = { lng: lng, lat: lat, name: name };
      document.getElementById('endInput').value = name;
      document.getElementById('result-list').style.display = 'none';
      planRoute();
    }

    function doSearchStart() {
      mapClickMode = 'start';
      var kw = document.getElementById('startInput').value.replace(/天安门广场|地图选点/g, '').replace(/^\s+|\s+$/, '');
      document.getElementById('keyword').value = kw;
      document.getElementById('keyword').placeholder = '输入起点地名';
      document.getElementById('result-list').style.display = 'none';
      document.getElementById('result-list-start').style.display = 'block';
      document.getElementById('search-row').style.display = 'flex';
      var kwi = document.getElementById('keyword');
      kwi.focus();
      kwi.select();
      if (kw) doKeywordSearch();
      log('🔍 搜索起点');
    }

    function doSearchEnd() {
      mapClickMode = 'end';
      var kw = document.getElementById('endInput').value.replace(/地图选点/g, '').replace(/^\s+|\s+$/, '');
      document.getElementById('keyword').value = kw;
      document.getElementById('keyword').placeholder = '输入终点地名';
      document.getElementById('result-list-start').style.display = 'none';
      document.getElementById('result-list').style.display = 'block';
      document.getElementById('search-row').style.display = 'flex';
      var kwi = document.getElementById('keyword');
      kwi.focus();
      kwi.select();
      if (kw) doKeywordSearch();
      log('🔍 搜索终点');
    }

    function cancelKeywordSearch() {
      document.getElementById('search-row').style.display = 'none';
      document.getElementById('result-list').style.display = 'none';
      document.getElementById('result-list-start').style.display = 'none';
      document.getElementById('keyword').value = '';
      mapClickMode = 'end';
    }

    function doKeywordSearch() {
      var keyword = document.getElementById('keyword').value.replace(/^\s+|\s+$/, '');
      if (!keyword) { log('请输入关键词'); return; }
      log('🔍 搜索: ' + keyword);
      var url = 'https://restapi.amap.com/v3/place/text?key=' + WEB_KEY +
        '&keywords=' + encodeURIComponent(keyword) +
        '&city=北京&citylimit=false&offset=8&output=json';
      xhrGet(url, function(data) {
        if (data.status === '1' && data.pois && data.pois.length > 0) {
          log('✅ 找到' + data.pois.length + '个结果');
          var html = '';
          for (var i = 0; i < data.pois.length; i++) {
            var poi = data.pois[i];
            var coords = poi.location.split(',');
            var d = poi.distance ? (parseInt(poi.distance) > 1000 ? (parseInt(poi.distance)/1000).toFixed(1) + 'km' : poi.distance + 'm') : '';
            var safeName = poi.name.replace(/'/g, "\\'");
            html += '<div class="result-item" data-lng="' + coords[0] + '" data-lat="' + coords[1] + '" data-name="' + safeName + '">' +
              '<div class="name">' + poi.name + '</div>' +
              '<div class="addr">' + (poi.pname || '') + (poi.cityname || '') + (poi.adname || '') + '</div>' +
              (d ? '<div class="dist">距起点约 ' + d + '</div>' : '') +
            '</div>';
          }
          document.getElementById('result-list').innerHTML = html;
          document.getElementById('result-list-start').innerHTML = html;
          // 绑定结果点击（用属性委托，不用内联onclick）
          bindResultItems();
        } else {
          var notFound = '<div style="padding:10px;color:#999;font-size:13px">未找到"' + keyword + '"</div>';
          document.getElementById('result-list').innerHTML = notFound;
          document.getElementById('result-list-start').innerHTML = notFound;
          log('未找到结果');
        }
      }, function(err) {
        var errMsg = '<div style="padding:10px;color:#c00;font-size:13px">网络错误</div>';
        document.getElementById('result-list').innerHTML = errMsg;
        document.getElementById('result-list-start').innerHTML = errMsg;
        log('网络错误: ' + err);
      });
    }

    // 结果列表点击（事件委托，不用内联onclick）
    function bindResultItems() {
      var lists = [document.getElementById('result-list'), document.getElementById('result-list-start')];
      for (var li = 0; li < lists.length; li++) {
        var items = lists[li].getElementsByClassName('result-item');
        for (var j = 0; j < items.length; j++) {
          items[j].onclick = function() {
            var lng = parseFloat(this.getAttribute('data-lng'));
            var lat = parseFloat(this.getAttribute('data-lat'));
            var name = this.getAttribute('data-name');
            if (mapClickMode === 'start') {
              setStartPoint(lng, lat, name);
            } else {
              setDestination(lng, lat, name);
            }
            cancelKeywordSearch();
          };
        }
      }
    }

    function planRoute() {
      if (!currentDest || !map) return;
      log('🧭 规划' + routeNames[currentRouteType] + '路线...');
      clearRoute();

      if (markerEnd) map.remove(markerEnd);
      markerEnd = new AMap.Marker({
        position: [currentDest.lng, currentDest.lat], map: map,
        content: '<div style="background:#EB5E1A;width:14px;height:14px;border-radius:50%;border:3px solid #fff"></div>',
        offset: new AMap.Pixel(-7, -7)
      });

      var originStr = currentPos[0] + ',' + currentPos[1];
      var destStr = currentDest.lng + ',' + currentDest.lat;
      var urlBase = 'https://restapi.amap.com/v3/direction/';
      var url = '';
      if (currentRouteType === 'driving') {
        url = urlBase + 'driving?key=' + WEB_KEY + '&origin=' + originStr + '&destination=' + destStr + '&strategy=0&extensions=all&output=json';
      } else if (currentRouteType === 'walking') {
        url = urlBase + 'walking?key=' + WEB_KEY + '&origin=' + originStr + '&destination=' + destStr + '&strategy=0&output=json';
      } else if (currentRouteType === 'transit') {
        url = 'https://restapi.amap.com/v3/direction/transit/integrated?key=' + WEB_KEY +
          '&origin=' + originStr + '&destination=' + destStr +
          '&city=北京&cityd=北京&strategy=5&output=json';
      }

      xhrGet(url, function(data) { handleRoute(data, currentRouteType); },
        function(err) { showRoutePanelError(); log('❌ 请求失败: ' + err); });
    }

    function handleRoute(data, type) {
      if (!data) { showRoutePanelError(); log('❌ 无返回数据'); return; }
      if (data.status !== '1') { showRoutePanelError(); log('❌ ' + (data.info || 'API错误')); return; }

      if (type === 'transit') {
        if (data.route && data.route.transits && data.route.transits.length > 0) {
          var transit = data.route.transits[0];
          showRoutePanel(transit, type);
          drawTransitRoute(transit);
          log('✅ 公交: ' + (transit.distance/1000).toFixed(1) + 'km, ' + Math.ceil(transit.duration/60) + '分钟');
        } else {
          showRoutePanelError();
          log('❌ 未找到公交路线(' + (data.info || '') + ')');
        }
        return;
      }

      if (data.route && data.route.paths && data.route.paths.length > 0) {
        var path = data.route.paths[0];
        showRoutePanel(path, type);
        drawRoutePath(path.steps);
        log('✅ ' + routeNames[type] + ': ' + (path.distance/1000).toFixed(1) + 'km, ' + Math.ceil(path.duration/60) + '分钟');
      } else {
        showRoutePanelError();
        log('❌ 未找到路线');
      }
    }

    function drawRoutePath(steps) {
      var path = []; currentAllSteps = []; var num = 1;
      for (var i = 0; i < steps.length; i++) {
        var step = steps[i];
        if (step.polyline) {
          var segs = step.polyline.split(';');
          for (var j = 0; j < segs.length; j++) {
            var c = segs[j].split(',');
            if (c.length >= 2) path.push([parseFloat(c[0]), parseFloat(c[1])]);
          }
        }
        currentAllSteps.push({ num: num++, instruction: step.instruction || '', road: step.road || '', distance: step.distance || 0 });
      }
      if (path.length > 1) {
        if (routeCopyLine) map.remove(routeCopyLine);
        if (routePolyline) map.remove(routePolyline);
        routeCopyLine = new AMap.Polyline({ path: path, strokeColor: '#FFB088', strokeWeight: 10, strokeOpacity: 0.3, lineJoin: 'round' });
        routePolyline = new AMap.Polyline({ path: path, strokeColor: '#EB5E1A', strokeWeight: 5, strokeOpacity: 0.9, lineJoin: 'round' });
        map.add([routeCopyLine, routePolyline]);
        map.setFitView([routePolyline]);
      }
    }

    function drawTransitRoute(transit) {
      var allPath = []; currentAllSteps = []; var segNum = 1;
      var segments = transit.segments || [];
      for (var i = 0; i < segments.length; i++) {
        var seg = segments[i];
        if (seg.walking && seg.walking.steps) {
          var wsteps = seg.walking.steps;
          for (var j = 0; j < wsteps.length; j++) {
            var s = wsteps[j];
            if (s.polyline) {
              var ps = s.polyline.split(';');
              for (var k = 0; k < ps.length; k++) {
                var c2 = ps[k].split(',');
                if (c2.length >= 2) allPath.push([parseFloat(c2[0]), parseFloat(c2[1])]);
              }
            }
          }
        }
        if (seg.buslines) {
          for (var b = 0; b < seg.buslines.length; b++) {
            var bl = seg.buslines[b];
            var busName = bl.name ? bl.name.replace(/\s/g, '') : '';
            currentAllSteps.push({ num: segNum, instruction: '乘坐 ' + busName, road: '', distance: seg.distance || 0 });
            if (bl.path) {
              var bps = bl.path.split(';');
              for (var k2 = 0; k2 < bps.length; k2++) {
                var c3 = bps[k2].split(',');
                if (c3.length >= 2) allPath.push([parseFloat(c3[0]), parseFloat(c3[1])]);
              }
            }
          }
        } else if (segNum === 1 && seg.walking && seg.walking.steps && seg.walking.steps.length > 0) {
          var last = seg.walking.steps[seg.walking.steps.length - 1];
          currentAllSteps.push({ num: segNum, instruction: last.instruction || '步行', road: '', distance: seg.walking.distance || 0 });
        }
        segNum++;
      }
      if (allPath.length > 1) {
        if (routePolyline) map.remove(routePolyline);
        routePolyline = new AMap.Polyline({ path: allPath, strokeColor: '#EB5E1A', strokeWeight: 4, strokeOpacity: 0.9, lineJoin: 'round' });
        map.add(routePolyline);
        map.setFitView([routePolyline]);
      }
    }

    function showRoutePanel(info, type) {
      var panel = document.getElementById('route-panel');
      panel.style.display = 'block';
      document.getElementById('rp-dest').textContent = currentDest.name;
      var dist = info.distance > 1000 ? (info.distance/1000).toFixed(1) + 'km' : (info.distance || 0) + 'm';
      var time = Math.ceil((info.duration || 0)/60) + '分钟';
      var cost = info.cost ? '，¥' + (typeof info.cost === 'number' ? info.cost.toFixed(1) : info.cost) : '';
      document.getElementById('rp-summary').innerHTML = routeIcons[type] + ' <span>' + dist + '</span> · <span>' + time + '</span>' + cost;
      renderSteps(currentAllSteps);
    }

    function showRoutePanelError() {
      var panel = document.getElementById('route-panel');
      panel.style.display = 'block';
      document.getElementById('rp-dest').textContent = currentDest ? currentDest.name : '—';
      document.getElementById('rp-summary').innerHTML = '❌ 路线规划失败';
      document.getElementById('rp-steps').innerHTML = '<div style="padding:16px;text-align:center;color:#999;font-size:13px">路线规划失败，请尝试其他起终点或出行方式</div>';
    }

    function renderSteps(steps) {
      var c = document.getElementById('rp-steps');
      var html = ''; var maxShow = Math.min(steps.length, 12);
      for (var i = 0; i < maxShow; i++) {
        var s = steps[i];
        var ds = s.distance > 1000 ? (s.distance/1000).toFixed(1) + 'km' : (s.distance || 0) + 'm';
        var instr = (s.instruction || '').replace(/<[^>]+>/g, '');
        html += '<div class="rp-step">' +
          '<div class="step-icon">' + s.num + '</div>' +
          '<div style="flex:1">' +
            '<div class="step-text">' + instr + '</div>' +
            (s.distance ? '<div class="step-dist">距离: ' + ds + '</div>' : '') +
            (s.road ? '<div class="step-road">📌 ' + s.road + '</div>' : '') +
          '</div>' +
        '</div>';
      }
      if (steps.length > 12) html += '<div style="text-align:center;padding:8px;color:#999;font-size:12px">...共' + steps.length + '步</div>';
      c.innerHTML = html;
    }

    function clearRoute() {
      if (!map) return;
      if (routePolyline) { map.remove(routePolyline); routePolyline = null; }
      if (routeCopyLine) { map.remove(routeCopyLine); routeCopyLine = null; }
      if (markerEnd) { map.remove(markerEnd); markerEnd = null; }
      currentAllSteps = [];
    }

    function resetView() {
      if (map) { map.setZoomAndCenter(14, currentPos); log('已回到起点'); }
    }

    function toggleTraffic() {
      if (!map) return;
      var btn = document.getElementById('trafficBtn');
      if (!trafficLayer) {
        try {
          trafficLayer = new AMap.TileLayer.Traffic({ zIndex: 8 });
          map.addLayer(trafficLayer);
          btn.classList.add('active');
          trafficOn = true;
          log('✅ 实时路况已开启');
        } catch(e) { log('⚠️ 路况不支持'); }
      } else {
        if (trafficOn) { trafficLayer.hide(); btn.classList.remove('active'); trafficOn = false; log('⛔ 关闭路况'); }
        else { trafficLayer.show(); btn.classList.add('active'); trafficOn = true; log('✅ 开启路况'); }
      }
    }

    function toggleMapStyle() {
      if (!map) return;
      try {
        mapStyleIdx = (mapStyleIdx + 1) % mapStyles.length;
        map.setMapStyle('amap://styles/' + mapStyles[mapStyleIdx]);
        log('🗺️ 样式: ' + mapStyleNames[mapStyleIdx]);
      } catch(e) { log('⚠️ 样式切换失败(' + e.message + ')'); }
    }

    function locateMe() {
      log('📍 定位中...');
      if (map && typeof AMap !== 'undefined' && AMap.Geolocation) {
        try {
          var geolocation = new AMap.Geolocation({ enableHighAccuracy: true, timeout: 10000 });
          geolocation.getCurrentPosition(function(status, result) {
            if (status === 'complete') {
              currentPos = [result.position.lng, result.position.lat];
              map.setCenter(currentPos);
              map.setZoom(15);
              renderStartMarker();
              document.getElementById('startInput').value = '我的位置';
              log('✅ 定位成功');
            } else { fallbackBrowserGeo(); }
          });
        } catch(e) { fallbackBrowserGeo(); }
      } else { fallbackBrowserGeo(); }
    }

    function fallbackBrowserGeo() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(p) {
          currentPos = [p.coords.longitude, p.coords.latitude];
          if (map) { map.setCenter(currentPos); map.setZoom(15); }
          renderStartMarker();
          document.getElementById('startInput').value = '我的位置';
          log('✅ 定位成功');
        }, function(e) {
          var msg = '定位失败';
          if (e.code === 1) msg = '权限被拒绝';
          else if (e.code === 2) msg = '信号弱';
          else if (e.code === 3) msg = '超时';
          log('❌ ' + msg + '（模拟器无GPS请手动输入起点）');
        }, { timeout: 8000 });
      } else {
        log('❌ 浏览器不支持定位（模拟器无GPS请手动输入起点）');
      }
    }

    // ====== 8. 事件绑定（全部用DOMContentLoaded包裹，不用HTML onclick）======
    function bindAllEvents() {
      log('🔗 开始绑定事件...');

      // 起点编辑按钮
      var btnStart = document.getElementById('btnStartEdit');
      if (btnStart) btnStart.onclick = function() { log('⚡ 点击了起点按钮'); doSearchStart(); };
      else log('❌ 找不到btnStartEdit');

      // 终点编辑按钮
      var btnEnd = document.getElementById('btnEndEdit');
      if (btnEnd) btnEnd.onclick = function() { log('⚡ 点击了终点按钮'); doSearchEnd(); };
      else log('❌ 找不到btnEndEdit');

      // 起点输入框点击
      var si = document.getElementById('startInput');
      if (si) si.onclick = function() { log('⚡ 点击了起点输入框'); doSearchStart(); };
      else log('❌ 找不到startInput');

      // 终点输入框点击
      var ei = document.getElementById('endInput');
      if (ei) ei.onclick = function() { log('⚡ 点击了终点输入框'); doSearchEnd(); };
      else log('❌ 找不到endInput');

      // 互换按钮
      var swapBtn = document.getElementById('btnSwap');
      if (swapBtn) swapBtn.onclick = function() {
        if (!currentDest) return;
        var tmpLng = currentPos[0], tmpLat = currentPos[1];
        currentPos = [currentDest.lng, currentDest.lat];
        currentDest = { lng: tmpLng, lat: tmpLat, name: document.getElementById('startInput').value };
        document.getElementById('startInput').value = currentDest.name;
        document.getElementById('endInput').value = '地图选点';
        renderStartMarker();
        planRoute();
        log('已互换起终点');
      };

      // 路线Tab（用addEventListener，更可靠）
      var tabsEl = document.getElementById('route-tabs');
      if (tabsEl) {
        tabsEl.addEventListener('click', function(e) {
          var btn = e.target;
          if (!btn || btn.className.indexOf('tab-btn') === -1) return;
          var type = btn.getAttribute('data-type');
          currentRouteType = type;
          var allTabs = tabsEl.getElementsByClassName('tab-btn');
          for (var i = 0; i < allTabs.length; i++) allTabs[i].classList.remove('active');
          btn.classList.add('active');
          if (currentDest) planRoute();
          log('已切换到' + routeNames[type]);
        });
      }

      // 搜索/取消按钮
      var btnSrch = document.getElementById('btnDoSearch');
      if (btnSrch) btnSrch.onclick = function() { log('⚡ 点击了搜索'); doKeywordSearch(); };

      var btnCancel = document.getElementById('btnCancelSearch');
      if (btnCancel) btnCancel.onclick = function() { cancelKeywordSearch(); log('已取消搜索'); };

      // 关键词回车
      var kwInput = document.getElementById('keyword');
      if (kwInput) kwInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { log('⚡ 回车搜索'); doKeywordSearch(); }
      });

      // 工具栏
      var tb = document.getElementById('trafficBtn');
      if (tb) tb.onclick = function() { toggleTraffic(); };
      var br = document.getElementById('btnReset');
      if (br) br.onclick = function() { resetView(); };
      var bs = document.getElementById('btnStyle');
      if (bs) bs.onclick = function() { toggleMapStyle(); };

      // 定位
      var lb = document.getElementById('locBtn');
      if (lb) lb.onclick = function() { locateMe(); };

      // 重试
      var db = document.getElementById('debug');
      if (db) db.onclick = function(e) {
        if (e.target.id === 'retryBtn') location.reload();
      };

      log('✅ 事件绑定完成，共绑定了' +
        (btnStart?1:0) + (btnEnd?1:0) + (si?1:0) + (ei?1:0) +
        (swapBtn?1:0) + (tabsEl?1:0) + (btnSrch?1:0) + (btnCancel?1:0) +
        (kwInput?1:0) + (tb?1:0) + (br?1:0) + (bs?1:0) + (lb?1:0) + (db?1:0) + '个元素');
    }

    // ====== 9. 启动（等DOM就绪）======
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        bindAllEvents();
        loadAMapScript('2.0');
      });
    } else {
      // DOM已经就绪
      bindAllEvents();
      loadAMapScript('2.0');
    }
  </script>
</body>
